services:
  # 포인트 서비스용 데이터베이스
  point-db:
    image: mariadb:latest
    container_name: point-db
    ports:
      - "3307:3306"  # 호스트의 3307 포트를 컨테이너 내부 3306 포트와 연결
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: point_db
    volumes:
      - point_db:/var/lib/mysql
    networks:
      - kafka-net

volumes:
  point_db:

networks:
  kafka-net:
    external: true