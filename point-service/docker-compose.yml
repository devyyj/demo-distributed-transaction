services:
  # 포인트 서비스용 데이터베이스
  point-db:
    image: mariadb:latest
    container_name: point-db
    ports:
      - "3307:3306"  # 호스트의 3307 포트를 컨테이너 내부 3306 포트와 연결
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: point_db
    volumes:
      - point_db:/var/lib/mysql
    # CDC를 위한 Binary Log 설정 추가
    command:
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --server-id=2  # order-db와 겹치지 않게 설정
      - --binlog-do-db=point_db
    networks:
      - kafka-net

volumes:
  point_db:

networks:
  kafka-net:
    external: true