server:
  port: 8081

spring:
  datasource:
    # Docker Compose에서 설정한 3307 포트와 point_db 데이터베이스 사용
    url: jdbc:mariadb://localhost:3307/point_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    function:
      # 구독: order.created, card.failed
      definition: orderCreatedConsumer;cardFailedConsumer
    stream:
      kafka:
        binder:
          brokers: localhost:9092
      bindings:
        # 구독 토픽 설정
        orderCreatedConsumer-in-0:
          destination: order.created
          group: point-service-group
        cardFailedConsumer-in-0:
          destination: card.failed
          group: point-service-group