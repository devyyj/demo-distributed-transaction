server:
  port: 8081

spring:
  datasource:
    # Docker Compose에서 설정한 3307 포트와 point_db 데이터베이스 사용
    url: jdbc:mariadb://localhost:3307/point_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    function:
      definition: orderEventsConsumer;cardEventsConsumer
    stream:
      kafka:
        binder:
          brokers: localhost:9092
        bindings:
          # Kafka 전용 컨슈머 설정: 재시도 실패 시 메시지를 DLQ 토픽으로 이동
          orderEventsConsumer-in-0:
            consumer:
              enable-dlq: true # DLQ 활성화
              dlq-name: order.events.point-service.dlq # DLQ 토픽명 명시
          cardEventsConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-name: card.events.point-service.dlq
      bindings:
        orderEventsConsumer-in-0:
          destination: order.events
          group: point-service-group
          consumer:
            max-attempts: 3 # 최대 시도 횟수 (기본 1회 + 재시도 2회)
            back-off-initial-interval: 1000 # 첫 재시도 대기 시간 (1초)
            back-off-multiplier: 2.0 # 재시도 간격 배수 (1초 -> 2초 -> 4초)
        cardEventsConsumer-in-0:
          destination: card.events
          group: point-service-group
          consumer:
            max-attempts: 3 # 최대 시도 횟수 (기본 1회 + 재시도 2회)
            back-off-initial-interval: 1000 # 첫 재시도 대기 시간 (1초)
            back-off-multiplier: 2.0 # 재시도 간격 배수 (1초 -> 2초 -> 4초)