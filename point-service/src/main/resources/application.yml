server:
  port: 8081

spring:
  datasource:
    # Docker Compose에서 설정한 3307 포트와 point_db 데이터베이스 사용
    url: jdbc:mariadb://localhost:3307/point_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    function:
      # 사용할 함수 빈(Bean) 이름을 세미콜론으로 구분하여 등록
      definition: orderCreatedConsumer;compensationConsumer
    stream:
      kafka:
        binder:
          brokers: localhost:9092
      bindings:
        orderCreatedConsumer-in-0: # [입력] 주문 생성 이벤트 수신
          destination: order-created-topic
          group: point-service-group
        pointDeducted-out-0: # [출력] 포인트 차감 성공 이벤트 발행 (StreamBridge 사용)
          destination: point-deducted-topic
        orderFailed-out-0: # [출력] 포인트 차감 실패 이벤트 발행 (StreamBridge 사용)
          destination: order-failed-topic
        compensationConsumer-in-0: # [입력] 보상 트랜잭션 수신
          destination: order-failed-topic
          group: point-service-group