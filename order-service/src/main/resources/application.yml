server:
  port: 8080

spring:
  datasource:
    # Docker Compose에서 설정한 3306 포트와 order_db 데이터베이스 사용
    url: jdbc:mariadb://localhost:3306/order_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      # 엔티티 기반으로 테이블 자동 생성 및 수정
      ddl-auto: update
    show-sql: true

  cloud:
    function:
      # 도메인 단위로 컨슈머 통합
      definition: pointEventsConsumer;cardEventsConsumer
    stream:
      kafka:
        binder:
          brokers: localhost:9092
        bindings:
          pointEventsConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-name: point.events.order-service.dlq # DLQ 토픽명 지정 (토픽명.그룹명.dlq 관례)
          cardEventsConsumer-in-0:
            consumer:
              enable-dlq: true
              dlq-name: card.events.order-service.dlq
      bindings:
        # 포인트 도메인의 모든 이벤트 구독
        pointEventsConsumer-in-0:
          destination: point.events
          group: order-service-group
          consumer:
            max-attempts: 3 # 최대 3번 시도 (기본 1회 + 재시도 2회)
            back-off-initial-interval: 1000 # 첫 재시도 대기 시간 (1초)
            back-off-multiplier: 2.0 # 재시도 간격 배수 (1초 -> 2초 -> 4초 순으로 증가)
        # 카드 도메인의 모든 이벤트 구독
        cardEventsConsumer-in-0:
          destination: card.events
          group: order-service-group
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-multiplier: 2.0
