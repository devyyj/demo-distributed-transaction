server:
  port: 8080

spring:
  datasource:
    # Docker Compose에서 설정한 3306 포트와 order_db 데이터베이스 사용
    url: jdbc:mariadb://localhost:3306/order_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      # 엔티티 기반으로 테이블 자동 생성 및 수정
      ddl-auto: update
    show-sql: true
