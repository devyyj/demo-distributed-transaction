spring:
  application:
    name: pay-monolith

  # 데이터베이스 연결 설정
  datasource:
    url: jdbc:mariadb://localhost:3306/pay_db?serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  # JPA 및 Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: update      # 엔티티 기반 테이블 자동 생성
    show-sql: true          # 실행 쿼리 출력
    properties:
      hibernate:
#        format_sql: true    # 쿼리 가독성 향상
        dialect: org.hibernate.dialect.MariaDBDialect