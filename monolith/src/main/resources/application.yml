spring:
  application:
    name: monolith # 애플리케이션 이름 설정

  datasource:
    # MariaDB 연결 설정 (Docker Compose에서 설정한 정보와 일치해야 함)
    # serverTimezone=UTC 설정으로 시간 관련 호환성 확보
    url: jdbc:mariadb://localhost:3306/monolith?serverTimezone=UTC&characterEncoding=UTF-8
    username: user
    password: password
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    # Hibernate 설정
    hibernate:
      # 개발 단계에서는 update를 사용하며, 실제 운영 시에는 validate 또는 none 권장
      ddl-auto: update
    # 실행되는 SQL 쿼리를 로그에 출력
    show-sql: true
    properties:
      hibernate:
        # SQL 출력 시 가독성 좋게 포맷팅
        format_sql: true
        # 주석으로 쿼리 목적 명시
        use_sql_comments: true
    # 데이터베이스 방언 설정 (MariaDB용)
    database-platform: org.hibernate.dialect.MariaDBDialect

# 로깅 설정
logging:
  level:
    # SQL 바인딩 파라미터 확인을 위한 로그 레벨 설정
    org.hibernate.orm.jdbc.bind: trace
