spring:
  application:
    name: monolith
  datasource:
    url: jdbc:mariadb://localhost:3306/monolith
    username: user
    password: password
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

point:
  default-balance: 10000

payment:
  simulate-delay-ms: 300
