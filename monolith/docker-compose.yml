services:
  # MariaDB 데이터베이스 서비스 설정
  mariadb:
    image: mariadb:latest
    container_name: monolith-db
    environment:
      # 루트 계정 비밀번호 설정
      MARIADB_ROOT_PASSWORD: root
      # 초기 생성 데이터베이스 이름
      MARIADB_DATABASE: monolith
      # 일반 사용자 계정 생성 및 비밀번호 설정
      MARIADB_USER: user
      MARIADB_PASSWORD: password
    ports:
      # 호스트의 3306 포트를 컨테이너의 3306 포트와 연결
      - "3306:3306"
    volumes:
      # 데이터 영속성을 위해 호스트 볼륨에 데이터 저장
      - mariadb_data:/var/lib/mysql

volumes:
  # Docker 관리 볼륨 정의
  mariadb_data:
