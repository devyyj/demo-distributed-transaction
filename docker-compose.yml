version: '3.8'

services:
  kafka:
    # Apache 공식 이미지를 사용합니다.
    image: apache/kafka:latest
    container_name: kafka-server
    ports:
      - "9092:9092" # 호스트 OS(내 로컬 PC)에서 접속하기 위한 포트
    environment:
      # KRaft 모드 필수 설정
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # 쿼럼 보터 설정: 자기 자신을 컨트롤러로 지정 (서비스 이름 사용 권장)
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-server:9093

      # 리스너 설정
      # 1. PLAINTEXT: 로컬 PC의 애플리케이션 접속용
      # 2. INTERNAL: Kafka UI 등 도커 네트워크 내부 서비스 접속용
      # 3. CONTROLLER: KRaft 컨트롤러 통신용
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka-server:9094
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL

      # [필수] KRaft 모드 실행을 위한 클러스터 ID
      # 아무 문자열이나 가능하며, 이 값이 있어야 내부적으로 스토리지 포맷팅을 수행합니다.
      - KAFKA_CLUSTER_ID=6EjyWf9XSaGySclS9TvssA
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    # 카프카 토픽과 메시지를 시각적으로 확인할 수 있는 대시보드 도구입니다.
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8083:8080"
    environment:
      # 대시보드에 표시할 클러스터 이름과 접속 정보
      - KAFKA_CLUSTERS_0_NAME=local-cluster
      # 도커 내부 네트워크를 사용하므로 INTERNAL 리스너 포트(9094)로 접속
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka-server:9094
      - DYNAMIC_CONFIG_ENABLED=true
    depends_on:
      - kafka

volumes:
  kafka_data:
    driver: local